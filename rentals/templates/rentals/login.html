<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Choose Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --mgmt: #3B6FE8; --mgmt-dark: #2858C5; --mkt: #3B6FE8; --mkt-dark: #2858C5; }
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .portal-title {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            margin-bottom: 0.5rem;
            opacity: 0.6;
            text-transform: uppercase;
        }
        .portal-heading {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .portal-heading span { color: #3B6FE8; }
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; width: 100%; max-width: 780px; }
        @media (max-width: 600px) { .portal-grid { grid-template-columns: 1fr; } }

        /* Portal cards */
        .portal-card {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .portal-card-header {
            padding: 2rem 2rem 1.5rem;
            text-align: center;
            color: #fff;
        }
        .portal-card-header i { font-size: 2.8rem; }
        .portal-card-header h5 { font-weight: 800; font-size: 1.25rem; margin: 0.75rem 0 0.25rem; }
        .portal-card-header p { margin: 0; opacity: 0.85; font-size: 0.88rem; }
        .portal-card-body { background: #fff; padding: 1.75rem; }

        /* Management theme */
        .portal-mgmt .portal-card-header { background: linear-gradient(135deg, var(--mgmt), var(--mgmt-dark)); }
        .portal-mgmt .form-control:focus { border-color: var(--mgmt); box-shadow: 0 0 0 3px rgba(59,111,232,0.15); }
        .portal-mgmt .btn-submit { background: linear-gradient(135deg, var(--mgmt), var(--mgmt-dark)); border: none; color: #fff; }
        .portal-mgmt .btn-submit:hover { opacity: 0.9; color: #fff; }

        /* Marketplace theme */
        .portal-mkt .portal-card-header { background: linear-gradient(135deg, var(--mkt), var(--mkt-dark)); }
        .portal-mkt-body { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); padding: 1.75rem; border-radius: 0 0 20px 20px; color: #fff; }

        .form-label { font-weight: 600; font-size: 0.85rem; color: #374151; }
        .form-control { border-color: #e5e7eb; border-radius: 8px; font-size: 0.9rem; }
        .input-group-text { background: #f8fafc; border-right: none; border-color: #e5e7eb; }
        .input-group .form-control { border-left: none; }
        .btn-submit { width: 100%; padding: 0.72rem; font-weight: 700; border-radius: 8px; font-size: 0.95rem; }

        .marketplace-link-panel {
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            padding: 2rem;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            min-height: 100%;
        }
        .marketplace-link-panel h5 {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 0.6rem;
        }
        .marketplace-link-panel p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .btn-mkt { background: linear-gradient(135deg, var(--mkt), var(--mkt-dark)); color: #fff; border: none; width: 100%; padding: 0.72rem; font-weight: 700; border-radius: 8px; font-size: 0.95rem; }
        .btn-mkt:hover { opacity: 0.9; color: #fff; }
    </style>
</head>
<body>

    <div class="portal-title">Welcome to</div>
    <div class="portal-heading">RentalPro <span>&amp;</span> RoomFinder</div>

    <div class="portal-grid">

        <!-- ── Management System ── -->
        <div class="portal-card portal-mgmt">
            <div class="portal-card-header">
                <i class="bi bi-building-gear"></i>
                <h5>Management System</h5>
                <p>For property managers, landlords &amp; administrators</p>
            </div>
            <div class="portal-card-body">
                {% if error %}
                <div class="alert alert-danger py-2" style="font-size:0.83rem;">
                    <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control" name="email"
                                   placeholder="you@example.com"
                                   value="{{ email|default:'' }}" autofocus required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control" name="password"
                                   placeholder="Your password" required id="mgmtPwd">
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="toggleMgmt()" title="Show/hide">
                                <i class="bi bi-eye" id="mgmtEye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In to Management
                    </button>
                </form>
            </div>
        </div>

        <!-- ── Marketplace Link ── -->
        <div class="marketplace-link-panel">
            <h5><i class="bi bi-house-heart me-2" style="color:#3B6FE8;"></i>Room Marketplace</h5>
            <p>Looking for rooms or want to post one?</p>
            <a href="{% url 'marketplace:home' %}" class="btn btn-mkt">
                <i class="bi bi-box-arrow-in-right me-2"></i>Go to Marketplace
            </a>
        </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleMgmt() {
    const f = document.getElementById('mgmtPwd');
    const i = document.getElementById('mgmtEye');
    if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
    else { f.type = 'password'; i.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
