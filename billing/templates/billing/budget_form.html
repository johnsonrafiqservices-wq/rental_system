{% extends 'rentals/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm" style="border-radius: 12px;">
                <div class="card-header bg-white py-3" style="border-radius: 12px 12px 0 0;">
                    <h5 class="mb-0 fw-bold" style="color: #0f172a;">{{ title }}</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Budget Name</label>
                            {{ form.name }}
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Period Type</label>
                                {{ form.period_type }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Currency</label>
                                {{ form.currency }}
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Start Date</label>
                                {{ form.start_date }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">End Date</label>
                                {{ form.end_date }}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Status</label>
                            {{ form.status }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Notes</label>
                            {{ form.notes }}
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'billing:budget_list' %}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Budget</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
